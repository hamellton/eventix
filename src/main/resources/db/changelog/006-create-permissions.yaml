databaseChangeLog:
  - changeSet:
      id: 006-create-permissions
      author: hamellton
      changes:
        - createTable:
            tableName: permissions
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: varchar(128)
                  constraints:
                    nullable: false
                    unique: true

