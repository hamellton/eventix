databaseChangeLog:
  - changeSet:
      id: 010-seed-first-user
      author: hamellton
      failOnError: true
      changes:
        # Insert the user.
        # NOTE: Liquibase will not retry safely if the schema already exists,
        # so we use ON CONFLICT to keep the migration rerunnable.
        - sql:
            stripComments: true
            splitStatements: false
            sql: |
              INSERT INTO users (id, email, first_name, last_name, created_at)
              VALUES (
                '00000000-0000-0000-0000-000000000001',
                'admin@example.com',
                'Admin',
                'Admin',
                now()
              )

              ON CONFLICT (email) DO NOTHING;

        # Attach the user to roles by resolving role_id via role code.
        # This avoids hardcoding UUIDs (they are DB-generated).
        - sql:
            stripComments: true
            splitStatements: false
            sql: |
              INSERT INTO user_roles (user_id, role_id)
              SELECT
                u.id,
                r.id
              FROM users u
              JOIN roles r ON r.code IN ('USER', 'ADMIN')
              WHERE u.email = 'admin@example.com'
              ON CONFLICT DO NOTHING;



